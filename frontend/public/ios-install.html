<!DOCTYPE html>
<html lang="it" id="html-root">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FAMMY — Installa su iPhone</title>
<style>
  :root { --bg: #FAF4ED; --ac: #C1624B; --k: #1C1611; --km: #77706A; --sm: #E8E0D6; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: linear-gradient(160deg,#FAF4ED 0%,#F0E6D7 100%); min-height: 100vh;
    font-family: -apple-system,system-ui,sans-serif; color: var(--k); }
  .wrap { max-width: 560px; margin: 0 auto; padding: 40px 24px 80px; }
  .lang-bar { display:flex; gap:8px; justify-content:flex-end; margin-bottom:32px; flex-wrap:wrap; }
  .lang-btn { background:white; border:1px solid var(--sm); border-radius:100px;
    padding:6px 14px; font-size:13px; font-weight:700; cursor:pointer; color:var(--k); }
  .lang-btn.active { background:var(--k); color:white; border-color:var(--k); }
  .logo { text-align:center; margin-bottom:8px; font-size:56px; }
  h1 { font-size:28px; font-weight:800; text-align:center; line-height:1.2; margin-bottom:8px; }
  .sub { text-align:center; color:var(--km); font-size:16px; margin-bottom:36px; line-height:1.5; }
  .step { display:flex; gap:16px; align-items:flex-start; margin-bottom:22px;
    background:white; border:1px solid var(--sm); border-radius:16px; padding:18px; }
  .step-num { width:32px; height:32px; border-radius:50%; background:var(--ac); color:white;
    font-weight:800; font-size:16px; display:flex; align-items:center; justify-content:center;
    flex-shrink:0; }
  .step-text { flex:1; }
  .step-text strong { font-size:15px; display:block; margin-bottom:4px; }
  .step-text span { font-size:13.5px; color:var(--km); line-height:1.5; }
  .step-icon { font-size:28px; margin-bottom:6px; display:block; }
  .url-box { background:white; border:1.5px solid var(--ac); border-radius:12px;
    padding:14px 16px; font-family:ui-monospace,monospace; font-size:15px; font-weight:700;
    text-align:center; color:var(--ac); margin:24px 0; word-break:break-all; }
  .note { background:white; border:1px solid var(--sm); border-radius:12px;
    padding:14px 16px; font-size:13px; color:var(--km); line-height:1.5; margin-top:24px; }
  .back { display:block; text-align:center; margin-top:28px; color:var(--ac);
    font-weight:700; text-decoration:none; font-size:15px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('it')">🇮🇹 IT</button>
    <button class="lang-btn" onclick="setLang('en')">🇬🇧 EN</button>
    <button class="lang-btn" onclick="setLang('fr')">🇫🇷 FR</button>
    <button class="lang-btn" onclick="setLang('de')">🇩🇪 DE</button>
  </div>

  <div class="logo">🏡</div>
  <h1 class="i18n" data-key="title"></h1>
  <p class="sub i18n" data-key="sub"></p>

  <div class="url-box">https://www.myfammy.app</div>

  <div class="step">
    <div class="step-num">1</div>
    <div class="step-text">
      <span class="step-icon">📱</span>
      <strong class="i18n" data-key="s1h"></strong>
      <span class="i18n" data-key="s1p"></span>
    </div>
  </div>
  <div class="step">
    <div class="step-num">2</div>
    <div class="step-text">
      <span class="step-icon">⬆️</span>
      <strong class="i18n" data-key="s2h"></strong>
      <span class="i18n" data-key="s2p"></span>
    </div>
  </div>
  <div class="step">
    <div class="step-num">3</div>
    <div class="step-text">
      <span class="step-icon">➕</span>
      <strong class="i18n" data-key="s3h"></strong>
      <span class="i18n" data-key="s3p"></span>
    </div>
  </div>
  <div class="step">
    <div class="step-num">4</div>
    <div class="step-text">
      <span class="step-icon">🎉</span>
      <strong class="i18n" data-key="s4h"></strong>
      <span class="i18n" data-key="s4p"></span>
    </div>
  </div>

  <div class="note i18n" data-key="note"></div>
  <a href="https://www.myfammy.app" class="back i18n" data-key="back"></a>
</div>

<script>
const T = {
  it: {
    title: 'Installa FAMMY\nsul tuo iPhone',
    sub: 'Segui questi 4 passi per aggiungere FAMMY alla schermata Home — funziona come un\'app vera, con notifiche.',
    s1h: 'Apri Safari', s1p: 'Vai su https://www.myfammy.app con Safari (non Chrome o Firefox — solo Safari può installare le PWA su iPhone).',
    s2h: 'Tocca il pulsante Condividi', s2p: 'È il quadratino con la freccia verso l\'alto (⬆️) nella barra in basso di Safari.',
    s3h: 'Seleziona "Aggiungi alla schermata Home"', s3p: 'Scorri in basso nel foglio e tocca "Aggiungi alla schermata Home +" — poi conferma con "Aggiungi" in alto a destra.',
    s4h: 'Apri FAMMY dalla Home', s4p: 'Trovi l\'icona FAMMY sulla Home. Aprila e fai login: l\'app è pronta, con notifiche push incluse.',
    note: '💡 Se non vedi il pulsante Condividi: assicurati di usare Safari, non un altro browser. Su iPad è in alto a destra.',
    back: '← Torna a myfammy.app'
  },
  en: {
    title: 'Install FAMMY\non your iPhone',
    sub: 'Follow these 4 steps to add FAMMY to your Home Screen — it works like a real app, with notifications.',
    s1h: 'Open Safari', s1p: 'Go to https://www.myfammy.app in Safari (not Chrome or Firefox — only Safari can install PWAs on iPhone).',
    s2h: 'Tap the Share button', s2p: 'It\'s the box with an arrow pointing up (⬆️) in Safari\'s bottom bar.',
    s3h: 'Select "Add to Home Screen"', s3p: 'Scroll down in the share sheet and tap "Add to Home Screen +" — then confirm with "Add" in the top right.',
    s4h: 'Open FAMMY from your Home', s4p: 'You\'ll find the FAMMY icon on your Home Screen. Open it and log in — the app is ready, with push notifications included.',
    note: '💡 Can\'t see the Share button? Make sure you\'re using Safari, not another browser. On iPad it\'s at the top right.',
    back: '← Back to myfammy.app'
  },
  fr: {
    title: 'Installer FAMMY\nsur votre iPhone',
    sub: 'Suivez ces 4 étapes pour ajouter FAMMY à votre écran d\'accueil — ça fonctionne comme une vraie app, avec notifications.',
    s1h: 'Ouvrir Safari', s1p: 'Allez sur https://www.myfammy.app dans Safari (pas Chrome ou Firefox — seul Safari peut installer les PWA sur iPhone).',
    s2h: 'Toucher le bouton Partager', s2p: 'C\'est le carré avec une flèche vers le haut (⬆️) dans la barre en bas de Safari.',
    s3h: 'Sélectionner "Sur l\'écran d\'accueil"', s3p: 'Faites défiler la feuille de partage et touchez "Sur l\'écran d\'accueil +" — puis confirmez avec "Ajouter" en haut à droite.',
    s4h: 'Ouvrir FAMMY depuis l\'accueil', s4p: 'Vous trouverez l\'icône FAMMY sur votre écran d\'accueil. Ouvrez-la et connectez-vous — l\'app est prête, avec les notifications push.',
    note: '💡 Vous ne voyez pas le bouton Partager ? Assurez-vous d\'utiliser Safari. Sur iPad, il est en haut à droite.',
    back: '← Retour à myfammy.app'
  },
  de: {
    title: 'FAMMY auf dem\niPhone installieren',
    sub: 'Folge diesen 4 Schritten, um FAMMY zum Home-Bildschirm hinzuzufügen — funktioniert wie eine echte App, mit Benachrichtigungen.',
    s1h: 'Safari öffnen', s1p: 'Gehe auf https://www.myfammy.app in Safari (nicht Chrome oder Firefox — nur Safari kann PWAs auf iPhone installieren).',
    s2h: 'Teilen-Taste antippen', s2p: 'Das ist das Kästchen mit dem Pfeil nach oben (⬆️) in der unteren Leiste von Safari.',
    s3h: '"Zum Home-Bildschirm" wählen', s3p: 'Scrolle im Teilen-Menü nach unten und tippe auf "Zum Home-Bildschirm +" — dann mit "Hinzufügen" oben rechts bestätigen.',
    s4h: 'FAMMY vom Home-Bildschirm öffnen', s4p: 'Du findest das FAMMY-Symbol auf deinem Home-Bildschirm. Öffne es und melde dich an — die App ist bereit, mit Push-Benachrichtigungen.',
    note: '💡 Siehst du die Teilen-Taste nicht? Stelle sicher, dass du Safari verwendest. Auf iPad ist sie oben rechts.',
    back: '← Zurück zu myfammy.app'
  }
};
let curLang = 'it';
function setLang(l) {
  curLang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.getAttribute('onclick').includes("'"+l+"'")));
  document.querySelectorAll('.i18n[data-key]').forEach(el => {
    const v = T[l][el.dataset.key] || '';
    el.style.whiteSpace = v.includes('\n') ? 'pre-line' : '';
    el.textContent = v;
  });
  document.documentElement.lang = l;
}
// Auto-detect browser language
const bl = (navigator.language || 'it').slice(0,2);
setLang(['it','en','fr','de'].includes(bl) ? bl : 'it');
</script>
</body>
</html>
