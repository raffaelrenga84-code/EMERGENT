<!DOCTYPE html>
<html lang="it" translate="no">
<head>
  <meta charset="UTF-8" />

  <!-- Disattiva traduttori automatici (Google/Edge/Yandex): manipolano il DOM
       e fanno crashare React con "removeChild not a child of this node". -->
  <meta name="google" content="notranslate">
  <meta http-equiv="Content-Language" content="it">

  <!-- ICONS & MANIFEST -->
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" href="/icon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ffffff">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- iOS PWA Settings -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FAMMY">

  <!-- Deep Linking & Session Persistence -->
  <meta name="apple-itunes-app" content="app-id=fammy-pwa">

  <title>FAMMY</title>

  <!--
    Hard-reset escape hatch INLINE: gira PRIMA del SW e dei bundle JS
    per funzionare anche con cache stale. Trigger: ?reset=1 nell'URL.
    Esempio: https://www.farxer.com/?reset=1
  -->
  <script>
    (function() {
      try {
        var params = new URLSearchParams(window.location.search);
        if (params.get('reset') !== '1') return;
        var jobs = [];
        try { localStorage.clear(); } catch (_) {}
        try { sessionStorage.clear(); } catch (_) {}
        if ('serviceWorker' in navigator) {
          jobs.push(navigator.serviceWorker.getRegistrations()
            .then(function(rs) { return Promise.all(rs.map(function(r) { return r.unregister(); })); })
            .catch(function() {}));
        }
        if ('caches' in window) {
          jobs.push(caches.keys()
            .then(function(keys) { return Promise.all(keys.map(function(k) { return caches.delete(k); })); })
            .catch(function() {}));
        }
        try {
          if (indexedDB.databases) {
            jobs.push(indexedDB.databases()
              .then(function(dbs) { (dbs || []).forEach(function(d) { if (d && d.name) indexedDB.deleteDatabase(d.name); }); })
              .catch(function() {}));
          }
        } catch (_) {}
        Promise.all(jobs).finally(function() { window.location.replace('/'); });
      } catch (e) { window.location.replace('/'); }
    })();
  </script>
</head>

  <body class="notranslate" translate="no">
    <div id="root" class="notranslate" translate="no"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
