name: FAMMY Backup DB

# Backup settimanale del database su GitHub (retention 90 giorni).
# Secret richiesto: SUPABASE_DB_URL = connection string "URI" del pooler
# (Supabase → Connect → Direct/Session pooler), con la password dentro.

on:
  schedule:
    - cron: '30 2 * * 0'   # ogni domenica 02:30 UTC
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Verifica il secret
        run: |
          # Pulisce spazi/newline invisibili: se restano, pg_dump non
          # riconosce l'URI e prova il socket locale (errore classico).
          URL=$(printf '%s' "${{ secrets.SUPABASE_DB_URL }}" | tr -d '[:space:]')
          echo "lunghezza dopo pulizia: ${#URL}"
          case "$URL" in
            postgresql://*|postgres://*) echo "prefisso OK" ;;
            "") echo "ERRORE: secret vuoto o non leggibile"; exit 1 ;;
            *) echo "ERRORE: non inizia con postgresql:// (spazi? virgolette?)"; exit 1 ;;
          esac
          echo "DB_URL=$URL" >> "$GITHUB_ENV"

      - name: Ispeziona utente e host (non mostra la password)
        run: |
          U=$(printf '%s' "${{ secrets.SUPABASE_DB_URL }}" | tr -d '[:space:]')
          echo "utente: $(printf '%s' "$U" | sed -E 's|postgres(ql)?://([^:]+):.*|\2|')"
          echo "host:   $(printf '%s' "$U" | sed -E 's|.*@([^/]+)/.*|\1|')"
          echo "atteso  utente: postgres.jwzoymvtxjzpymaywjtw"
          echo "atteso  host:   aws-0-eu-west-1.pooler.supabase.com:5432"

      - name: Installa client PostgreSQL 17
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update && sudo apt-get install -y postgresql-client-17

      - name: Dump del database
        run: |
          STAMP=$(date +%Y-%m-%d)
          pg_dump "$DB_URL" \
            --no-owner --no-privileges --clean --if-exists \
            -f "fammy-backup-$STAMP.sql"
          gzip "fammy-backup-$STAMP.sql"
          ls -lh fammy-backup-*.sql.gz

      - name: Carica il backup come artifact
        uses: actions/upload-artifact@v4
        with:
          name: fammy-backup
          path: fammy-backup-*.sql.gz
          retention-days: 90
