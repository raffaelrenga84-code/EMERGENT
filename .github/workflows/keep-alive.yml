name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 8 */2 * *'   # ogni 2 giorni alle 8:00 UTC
  workflow_dispatch:          # permette avvio manuale per test

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s -f \
            "https://jwzoymvtxjzpymaywjtw.supabase.co/rest/v1/families?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
          echo "Ping OK"
